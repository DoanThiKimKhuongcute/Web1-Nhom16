<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccountShop | Chi tiết sản phẩm</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; background-color: #f9f9f9; color: #222; }
    header { text-align: center; }
    header h1 { color: #333; }
    nav a {
      margin: 0 10px;
      color: #007bff;
      text-decoration: none;
    }
    .product-info {
      max-width: 600px;
      margin: 40px auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .product-info img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .product-info h2 { color: #000; }
    .product-info button {
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 10px 15px;
      cursor: pointer;
    }
    footer { text-align: center; margin-top: 30px; color: #555; }
  </style>
</head>
<body>

  <header>
    <h1>🎮 AccountShop</h1>
    <nav>
      <a href="index.html">Trang chủ</a>
      <a href="products.html">Sản phẩm</a>
      <a href="contact.html">Liên hệ</a>
    </nav>
  </header>

  <div class="product-info">
    <img id="product-img" src="" alt="">
    <h2 id="product-name"></h2>
    <p><strong id="product-price"></strong></p>
    <p id="product-desc"></p>
    <button>Mua ngay</button>
  </div>

  <footer>
    <p>© 2025 AccountShop. All rights reserved.</p>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const products = {
      1: {
        name: "Tài khoản Liên Quân VIP",
        price: "250.000đ",
        desc: "Rank Cao Thủ, 150 tướng, 120 skin, winrate 70%.",
        img: "images/lienquan1.jpg"
      },
      2: {
        name: "Tài khoản Liên Quân Rank Cao",
        price: "180.000đ",
        desc: "Rank Tinh Anh, 120 tướng, 80 skin, winrate 60%.",
        img: "images/lienquan2.jpg"
      },
      3: {
        name: "Tài khoản Free Fire Giá Rẻ",
        price: "90.000đ",
        desc: "Level 60, có 30 súng và 15 skin hiếm.",
        img: "images/freefire1.jpg"
      },
      4: {
        name: "Tài khoản Free Fire Full Skin",
        price: "220.000đ",
        desc: "Full skin, 100 súng, 50 nhân vật, nhiều đồ hiếm.",
        img: "images/freefire2.jpg"
      }
    };

    const p = products[id] || products[1];
    document.getElementById("product-img").src = p.img;
    document.getElementById("product-name").textContent = p.name;
    document.getElementById("product-price").textContent = "Giá: " + p.price;
    document.getElementById("product-desc").textContent = "Thông tin: " + p.desc;
  </script>

</body>
</html>
